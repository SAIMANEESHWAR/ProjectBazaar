AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DynamoDB table + GSI + HTTP API Lambda for company compare data

Globals:
  Function:
    Timeout: 29
    Runtime: python3.12
    Architectures:
      - arm64
    MemorySize: 256

Parameters:
  Stage:
    Type: String
    Default: dev
    Description: Deployment stage name
  AdminSyncKey:
    Type: String
    NoEcho: true
    Description: Secret key for admin sync routes (x-admin-key header)

Resources:
  CompanyCompareTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-companies'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: companyId
          AttributeType: S
        - AttributeName: streamPartition
          AttributeType: S
        - AttributeName: name
          AttributeType: S
      KeySchema:
        - AttributeName: companyId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ByStream
          KeySchema:
            - AttributeName: streamPartition
              KeyType: HASH
            - AttributeName: name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  CompanyCompareFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-api'
      Handler: company_compare_handler.lambda_handler
      CodeUri: ../
      Environment:
        Variables:
          COMPARE_TABLE_NAME: !Ref CompanyCompareTable
          STAGE: !Ref Stage
          ADMIN_SYNC_KEY: !Ref AdminSyncKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CompanyCompareTable
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref CompanyCompareHttpApi
            Path: /
            Method: POST
        ApiCompanies:
          Type: HttpApi
          Properties:
            ApiId: !Ref CompanyCompareHttpApi
            Path: /companies
            Method: POST
        ApiCompaniesProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref CompanyCompareHttpApi
            Path: /companies/{proxy+}
            Method: POST
        ApiAdminCompanies:
          Type: HttpApi
          Properties:
            ApiId: !Ref CompanyCompareHttpApi
            Path: /admin/companies
            Method: POST
        ApiAdminCompaniesProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref CompanyCompareHttpApi
            Path: /admin/companies/{proxy+}
            Method: POST

  CompanyCompareHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowCredentials: false
        AllowHeaders:
          - '*'
        AllowMethods:
          - POST
          - OPTIONS
        AllowOrigins:
          - '*'

Outputs:
  HttpApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub 'https://${CompanyCompareHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'
  CompareTableName:
    Description: DynamoDB table name
    Value: !Ref CompanyCompareTable
  CompanyCompareFunctionArn:
    Description: Lambda ARN
    Value: !GetAtt CompanyCompareFunction.Arn
