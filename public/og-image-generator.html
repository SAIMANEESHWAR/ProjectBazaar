<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG Image Generator — CodeXCareer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #111; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 24px; }
  h1 { color: #fff; font-size: 18px; font-weight: 500; }
  p.hint { color: #888; font-size: 13px; }
  button { padding: 12px 32px; background: #ff7a00; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { background: #e86e00; }
  .frame { border: 1px solid #333; }

  #og {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; overflow: hidden;
  }

  #og::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,122,0,0.12) 0%, transparent 70%);
  }

  .og-grid {
    position: absolute; inset: 0; opacity: 0.06;
    background-image:
      linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .og-content { position: relative; z-index: 1; text-align: center; padding: 0 100px; }

  .og-logo {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
  }
  .og-logo img { height: 56px; width: auto; max-width: min(420px, 90%); object-fit: contain; }

  .og-title {
    font-size: 56px; font-weight: 800; line-height: 1.15;
    color: #fff; letter-spacing: -1.5px; margin-bottom: 20px;
  }
  .og-title .accent { color: #ff7a00; }

  .og-desc {
    font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.6);
    line-height: 1.5; max-width: 700px; margin: 0 auto 36px;
  }

  .og-pills {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }
  .og-pill {
    padding: 8px 20px; border-radius: 100px; font-size: 14px; font-weight: 600;
    border: 1px solid rgba(255,122,0,0.3); color: rgba(255,255,255,0.8);
    background: rgba(255,122,0,0.08);
  }

  .og-url {
    position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
    font-size: 16px; color: rgba(255,255,255,0.3); font-weight: 500; letter-spacing: 1px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <h1>OG Image Preview (1200 &times; 630)</h1>

  <div id="og" class="frame">
    <div class="og-grid"></div>
    <div class="og-content">
      <div class="og-logo">
        <img src="/codexcareer-logo.png" alt="CodeXCareer — codexcareer, CODE • LEARN • LAUNCH" width="420" height="90" />
      </div>
      <div class="og-title">
        Discover. Build. <span class="accent">Earn.</span>
      </div>
      <div class="og-desc">
        The marketplace for projects, freelance collaborations, mock assessments, and career tools.
      </div>
      <div class="og-pills">
        <span class="og-pill">Buy &amp; Sell Projects</span>
        <span class="og-pill">Freelancers</span>
        <span class="og-pill">Mock Assessments</span>
        <span class="og-pill">Resume Builder</span>
      </div>
    </div>
    <div class="og-url">projectbazaar.in</div>
  </div>

  <button onclick="downloadPNG()">Download as PNG (1200×630)</button>
  <p class="hint">After downloading, place the file at <code>public/og-image.png</code> and redeploy.</p>

  <canvas id="canvas" width="1200" height="630" style="display:none;"></canvas>

<script>
async function downloadPNG() {
  const el = document.getElementById('og');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Use html2canvas-style approach via SVG foreignObject
  const data = new XMLSerializer().serializeToString(el);
  const svgStr = `
    <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
          ${el.outerHTML}
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
            ${document.querySelector('style').textContent}
          </style>
        </div>
      </foreignObject>
    </svg>`;

  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 1200, 630);
    URL.revokeObjectURL(url);
    canvas.toBlob((pngBlob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(pngBlob);
      a.download = 'og-image.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  };
  img.src = url;
}
</script>
</body>
</html>
